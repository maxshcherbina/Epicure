# For more information about tox, see https://tox.readthedocs.io/en/latest/
[tox]
envlist = py{310,311,312}-{linux,macos,windows}
isolated_build=true

[gh-actions]
python =
    3.10: py310
	3.11: py311
	3.12: py312

[gh-actions:env]
PLATFORM =
    ubuntu-latest: linux
    macos-latest: macos
    windows-latest: windows

[testenv]
platform =
    macos: darwin
    linux: linux
    windows: win32
passenv =
    CI
    GITHUB_ACTIONS
    DISPLAY
    XAUTHORITY
    NUMPY_EXPERIMENTAL_ARRAY_FUNCTION
    PYVISTA_OFF_SCREEN
extras = testing # dependincies in pyproject.toml
setenv =
    # Use offscreen rendering on Linux CI (no display needed)
    PYTHONFAULTHANDLER = 1
    #QT_QPA_PLATFORM = {env:QT_QPA_PLATFORM:offscreen} 
    QT_QPA_PLATFORM = offscreen
    LIBGL_ALWAYS_SOFTWARE = 1          # force software rendering
    DISPLAY = :0                        # dummy display


commands = pytest -v --color=yes 
#--cov=epicure --cov-report=xml
